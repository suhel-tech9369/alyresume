<!DOCTYPE html>

<head>
  <meta charset="UTF-8"/>

  online CV maker India,
  chat se resume banane wali website,
  AI se resume kaise banaye,
  freshers resume kaise banaye
  ">

  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <meta name="author" content="AlyResume">
  <meta name="language" content="English, Hindi">
  <meta name="revisit-after" content="2 days">

  <meta property="og:title" content="Free AI Resume Builder Chat">
  <meta property="og:description" content="AI chat se resume banaye free. ATS-friendly resume in minutes. No signup required. Instant download.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://alyresume.com/static/logo.png">
  <meta property="og:url" content="https://alyresume.com/chat">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Free AI Resume Builder Chat">
  <meta name="twitter:description" content="Create resume using AI chat free. ATS-friendly CV builder India.">
  <meta name="twitter:image" content="https://alyresume.com/static/logo.png">

  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
</head>

<body>

<!-- ===== CHAT SCREEN ===== -->
<div class="chat-container">

  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <span class="header-title">💬 Resume Chat Assistant</span>
      <span class="step-badge" id="stepBadge">Step 1/10</span>
    </div>
    <div class="header-right">
      <button id="templateBtn" class="template-header-btn">🎨 Template</button>
      <button id="newResumeBtn" class="new-btn">🔄 New</button>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:10%"></div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-box" id="chatBox"></div>

  <!-- Input -->
  <div class="chat-input">
    <input id="user-input" type="text" placeholder="Type your answer..." autocomplete="off"/>
    <button id="send-btn">Send</button>
  </div>

</div>

<!-- ===== TEMPLATE POPUP ===== -->
<div id="templatePopup" class="template-popup">
  <div class="popup-box">

    <h3>Select Resume Template</h3>

    <div class="template-grid">

      <div class="template-card" data-template="1">
        <img src="{{ url_for('static', filename='template1.jpg') }}" alt="Template 1">
        <p>Template 1</p>
        <span class="price-tag green">Free</span>
      </div>

      <div class="template-card" data-template="2">
        <img src="{{ url_for('static', filename='template2.jpg') }}" alt="Template 2">
        <p>Template 2</p>
        <span class="price-tag blue">₹49</span>
      </div>

      <div class="template-card" data-template="3">
        <img src="{{ url_for('static', filename='template3.jpg') }}" alt="Template 3">
        <p>Template 3</p>
        <span class="price-tag blue">₹49</span>
      </div>

    </div>

    <button id="closeTemplate" class="close-btn">Close</button>

  </div>
</div>

<script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
